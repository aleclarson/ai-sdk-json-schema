name: Regenerate catalog

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

concurrency:
  group: regenerate-catalog
  cancel-in-progress: false

jobs:
  generate:
    name: Generate catalog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.generated-changes.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate catalog
        run: pnpm generate

      - name: Check generated changes
        id: generated-changes
        run: |
          if [ -n "$(git status --porcelain -- src/generated)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive generated catalog
        if: steps.generated-changes.outputs.changed == 'true'
        run: tar -czf generated-catalog.tgz src/generated

      - name: Upload generated catalog
        if: steps.generated-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-catalog
          path: generated-catalog.tgz
          if-no-files-found: error

  pull-request:
    name: Open or update pull request
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.changed == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download generated catalog
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: generated-catalog

      - name: Restore generated catalog
        run: tar -xzf generated-catalog.tgz

      - name: Open or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_BRANCH: automated/regenerate-catalog
          PR_TITLE: 'chore: regenerate catalog'
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- src/generated)" ]; then
            echo "No catalog changes generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$UPDATE_BRANCH"
          git add src/generated
          git commit -m "$PR_TITLE"
          git push --force-with-lease "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$UPDATE_BRANCH"

          pr_url="$(gh pr list \
            --head "$UPDATE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [ -n "$pr_url" ]; then
            gh pr edit "$pr_url" \
              --title "$PR_TITLE" \
              --body "Regenerates the catalog with \`pnpm generate\`."
            echo "Updated $pr_url"
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body "Regenerates the catalog with \`pnpm generate\`." \
              --head "$UPDATE_BRANCH" \
              --base "${{ github.event.repository.default_branch }}"
          fi
